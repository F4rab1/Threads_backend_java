spring:
  application:
    name: threads
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpiration: 900
    refreshTokenExpiration: 604800
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB